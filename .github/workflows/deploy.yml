name: Deploy Trendiv Web

on:
  push:
    branches: [master, develop]
    paths:
      - "trendiv-web/**"
      - "trendiv-pipeline-controller/**"
      - "trendiv-analysis-module/**"
      - "trendiv-scraper-module/**"
      - "trendiv-result-module/**"
      - ".github/workflows/deploy.yml"

  # Preview: PR + preview 라벨
  pull_request:
    types: [labeled]

# 중복 실행 방지
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 🚀 Production 배포 (master → trendiv.org, v1)
  # ============================================
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter trendiv-web build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}

      - name: Deploy to Cloudflare (Production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: trendiv-web
          directory: trendiv-web/.svelte-kit/cloudflare
          branch: master

  # ============================================
  # 🧪 Staging 배포 (develop → develop.trendiv-web.pages.dev, v2)
  # ============================================
  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter trendiv-web build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}

      - name: Deploy to Cloudflare (Staging)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: trendiv-web
          directory: trendiv-web/.svelte-kit/cloudflare
          branch: develop

  # ============================================
  # 🖥️ Oracle 백엔드 배포 (develop → Oracle VM)
  # ============================================
  deploy-oracle:
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/develop' && (
        contains(toJson(github.event.commits.*.modified), 'trendiv-pipeline-controller') ||
        contains(toJson(github.event.commits.*.modified), 'trendiv-analysis-module') ||
        contains(toJson(github.event.commits.*.modified), 'trendiv-scraper-module') ||
        contains(toJson(github.event.commits.*.modified), 'trendiv-result-module') ||
        contains(toJson(github.event.commits.*.added), 'trendiv-pipeline-controller') ||
        contains(toJson(github.event.commits.*.added), 'trendiv-analysis-module') ||
        contains(toJson(github.event.commits.*.added), 'trendiv-scraper-module') ||
        contains(toJson(github.event.commits.*.added), 'trendiv-result-module')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Oracle via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd ~/trendiv
            git pull origin develop
            pnpm install --frozen-lockfile
            pnpm --filter trendiv-analysis-module build
            pnpm --filter trendiv-result-module build
            pnpm --filter trendiv-scraper-module build
            pnpm --filter trendiv-pipeline-controller build
            pm2 restart 0
            echo "✅ Oracle 배포 완료"

  # ============================================
  # 👀 Preview 배포 (preview 라벨 → develop URL)
  # ============================================
  deploy-preview:
    if: |
      github.event_name == 'pull_request' && 
      github.event.action == 'labeled' && 
      github.event.label.name == 'preview'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter trendiv-web build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}

      - name: Deploy Preview to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: trendiv-web
          directory: trendiv-web/.svelte-kit/cloudflare
          branch: develop

      - name: Comment Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🚀 Preview 배포 완료! https://develop.trendiv-web.pages.dev`
            });

      - name: Remove Label
        if: always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'preview'
            });
